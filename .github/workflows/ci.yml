name: Cronie CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: backend

      - name: Check app starts without crashing
        run: timeout 10s node src/server.js || true
        working-directory: backend
        env:
          PORT: 3000
          MONGO_URI: ${{ secrets.MONGO_URI }}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cronie — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <div class="header-brand">
      <span>⏱</span>
      <span>Cronie</span>
    </div>
    <nav class="header-nav">
      <a href="/" class="nav-link active">Dashboard</a>
      <a href="/executionHistory.html" class="nav-link">Execution History</a>
    </nav>
  </header>

  <div class="container">
    <div class="main">

      <!-- LEFT SIDE: JOBS -->
      <section class="jobs-section">
        <div class="section-header">
          <div>
            <h2>Scheduled Jobs</h2>
            <p class="section-sub">All your active and pending cron jobs</p>
          </div>
          <button class="btn btn-ghost btn-sm" onclick="loadJobs()">↻ Refresh</button>
        </div>

        <div id="errorBanner" class="error-banner hidden"></div>
        <div id="jobsContainer"></div>
      </section>

      <!-- RIGHT SIDE: CREATE JOB -->
      <div class="form-section">
        <h2>Create Job</h2>

        <form id="jobForm" class="job-form">
          <input type="text" id="name" placeholder="Job Name" required />

          <input type="text" id="cron" placeholder="Cron Expression (e.g. */1 * * * *)" required />

          <select id="method">
            <option value="GET">GET</option>
            <option value="POST">POST</option>
          </select>

          <input type="text" id="url" placeholder="Target URL" required />

          <button type="submit" class="btn-primary">Create Job</button>
        </form>

        <p id="message"></p>
      </div>

    </div>
  </div>

  <script src="dashboard.js"></script>

  <script>
    document.getElementById("jobForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const name = document.getElementById("name").value;
      const cronExpression = document.getElementById("cron").value;
      const httpMethod = document.getElementById("method").value;
      const targetUrl = document.getElementById("url").value;

      // ✅ VALIDATION
      if (!cronExpression.includes("*")) {
        document.getElementById("message").innerText = "❌ Invalid cron format";
        return;
      }

      if (!targetUrl.startsWith("http")) {
        document.getElementById("message").innerText = "❌ Invalid URL";
        return;
      }

      try {
        const res = await fetch("/jobs", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            name,
            cronExpression,
            httpMethod,
            targetUrl,
          }),
        });

        if (res.ok) {
          document.getElementById("message").innerText = "✅ Job created successfully!";
          document.getElementById("jobForm").reset();

          // ✅ AUTO REFRESH JOBS
          loadJobs();

          // ✅ CLEAR MESSAGE AFTER 3 SEC
          setTimeout(() => {
            document.getElementById("message").innerText = "";
          }, 3000);

        } else {
          document.getElementById("message").innerText = "❌ Failed to create job";
        }
      } catch (err) {
        document.getElementById("message").innerText = "⚠️ Error creating job";
      }
    });
  </script>

</body>
</html>
